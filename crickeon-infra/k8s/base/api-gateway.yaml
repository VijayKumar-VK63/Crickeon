apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: lamcl
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/your-org/lamcl-api-gateway:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: lamcl
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
