apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: lamcl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args: ['--config.file=/etc/prometheus/prometheus.yml']
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: lamcl-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: lamcl
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lamcl-prometheus-config
  namespace: lamcl
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: api-gateway
        metrics_path: /api/v1/metrics
        static_configs:
          - targets: ['api-gateway:80']
