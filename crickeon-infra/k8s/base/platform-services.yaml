apiVersion: apps/v1
kind: Deployment
metadata:
  name: auction-service
  namespace: lamcl
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auction-service
  template:
    metadata:
      labels:
        app: auction-service
    spec:
      containers:
        - name: auction-service
          image: ghcr.io/your-org/lamcl-auction-service:latest
          ports:
            - containerPort: 3002
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lamcl-secrets
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: lamcl-secrets
                  key: redis_url
---
apiVersion: v1
kind: Service
metadata:
  name: auction-service
  namespace: lamcl
spec:
  selector:
    app: auction-service
  ports:
    - port: 3002
      targetPort: 3002
---
